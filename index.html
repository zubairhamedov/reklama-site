<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zubair Hamedov Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00C853;
      --green2: #00E676;
      --dark: #090909;
      --card: #111111;
      --border: #1e1e1e;
      --text: #F0F0F0;
      --muted: #555;
      --accent: #00C853;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(9,9,9,0.97); backdrop-filter: blur(16px);
      border-bottom: 1px solid #1a2e1a;
      padding: 13px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-badge {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #00C853, #004D20);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: white;
      box-shadow: 0 0 12px rgba(0,200,83,0.3);
    }
    .logo-text .name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; }
    .logo-text .sub { font-size: 11px; color: var(--green); }
    .live-badge {
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.3);
      color: var(--green2); padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .live-dot { width: 6px; height: 6px; background: var(--green2); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(1.4)} }

    /* HERO */
    .hero {
      margin: 14px; border-radius: 20px; padding: 28px 22px;
      background: linear-gradient(135deg, #003d1a 0%, #005c28 50%, #00873c 100%);
      position: relative; overflow: hidden;
      border: 1px solid #00C85333;
    }
    .hero::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 160px; height: 160px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,83,0.2), transparent);
    }
    .hero::after {
      content: '📱'; position: absolute; right: 10px; bottom: -5px;
      font-size: 100px; opacity: 0.15; transform: rotate(10deg);
    }
    .hero-tag {
      display: inline-block; background: rgba(0,200,83,0.15);
      border: 1px solid rgba(0,200,83,0.4); color: var(--green2);
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      margin-bottom: 12px;
    }
    .hero h2 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: white; line-height: 1.2; margin-bottom: 8px; }
    .hero p { color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 18px; }
    .hero-call {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--green); color: #001a0a;
      padding: 11px 22px; border-radius: 30px;
      font-weight: 700; font-size: 14px; text-decoration: none;
      box-shadow: 0 4px 20px rgba(0,200,83,0.4);
    }

    /* SECTION */
    .section-head { padding: 20px 18px 12px; display: flex; align-items: center; gap: 10px; }
    .section-head h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
    .count-badge {
      background: var(--green); color: #001a0a;
      font-size: 11px; font-weight: 800; padding: 2px 9px; border-radius: 10px;
    }

    /* GRID */
    .products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 14px 110px; }

    /* CARD */
    .card {
      background: var(--card); border-radius: 18px; overflow: hidden;
      border: 1px solid var(--border);
      animation: fadeUp 0.5s ease both;
      transition: border-color 0.3s, transform 0.2s;
    }
    .card:active { transform: scale(0.97); border-color: var(--green); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .card-img-wrap { position: relative; overflow: hidden; }
    .card-img { width: 100%; height: 155px; object-fit: cover; display: block; background: #1a1a1a; transition: transform 0.4s; }
    .card:active .card-img { transform: scale(1.04); }
    .card-badge {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,200,83,0.85); backdrop-filter: blur(4px);
      color: white; font-size: 9px; font-weight: 700;
      padding: 3px 8px; border-radius: 8px; letter-spacing: 0.5px;
    }

    .card-body { padding: 11px; }
    .card-name {
      font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-price {
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
      color: var(--green); margin-bottom: 8px;
    }

    /* SPECS */
    .specs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
    .spec-tag {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #999; font-size: 9px; font-weight: 600;
      padding: 3px 7px; border-radius: 6px;
    }

    .call-btn {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      background: linear-gradient(135deg, var(--green), #009e3d);
      color: #001a0a; text-decoration: none; padding: 9px 0; border-radius: 10px;
      font-size: 12px; font-weight: 700;
      box-shadow: 0 3px 12px rgba(0,200,83,0.25);
    }

    /* LOADING */
    .loading-wrap { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #1a2e1a;
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-wrap p { color: var(--muted); font-size: 14px; }

    /* EMPTY */
    .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
    .empty .icon { font-size: 52px; margin-bottom: 12px; }
    .empty p { color: var(--muted); font-size: 14px; }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(9,9,9,0.97); border-top: 1px solid #1a2e1a;
      backdrop-filter: blur(16px); padding: 12px 20px 22px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .bottom-info .label { font-size: 11px; color: var(--muted); }
    .bottom-info .phone { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
    .bottom-call {
      display: flex; align-items: center; gap: 7px;
      background: var(--green); color: #001a0a;
      padding: 12px 20px; border-radius: 30px;
      font-weight: 700; font-size: 14px; text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,200,83,0.35);
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 4px 16px rgba(0,200,83,0.35); }
      50% { box-shadow: 0 4px 28px rgba(0,200,83,0.65); }
    }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px); z-index: 200;
      display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal {
      background: #111; border-radius: 24px 24px 0 0;
      border: 1px solid #1a2e1a; border-bottom: none;
      padding: 20px; width: 100%; max-height: 85vh; overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width: 40px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 16px; }
    .modal-img { width: 100%; height: 220px; object-fit: cover; border-radius: 14px; margin-bottom: 14px; }
    .modal-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .modal-price { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--green); margin-bottom: 16px; }
    .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .spec-item { background: #1a1a1a; border: 1px solid #252525; border-radius: 12px; padding: 10px; }
    .spec-item .s-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .spec-item .s-val { font-size: 13px; font-weight: 700; color: var(--text); }
    .modal-call {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--green); color: #001a0a;
      padding: 15px; border-radius: 14px; text-decoration: none;
      font-weight: 700; font-size: 16px; margin-bottom: 10px;
      box-shadow: 0 4px 20px rgba(0,200,83,0.4);
    }
    .modal-close {
      width: 100%; background: #1a1a1a; border: 1px solid #252525;
      color: var(--muted); padding: 12px; border-radius: 14px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-badge">ZH</div>
      <div class="logo-text">
        <div class="name">Zubair Hamedov</div>
        <div class="sub">Shop • Telefon & Elektronika</div>
      </div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </header>

  <div class="hero">
    <div class="hero-tag">⚡ Premium sifat</div>
    <h2>Eng yaxshi<br>telefonlar</h2>
    <p>Qulay narxda, kafolat bilan</p>
    <a class="hero-call" href="tel:+996554758525">📞 Bog'lanish</a>
  </div>

  <div class="section-head">
    <h3>Mahsulotlar</h3>
    <span class="count-badge" id="count">0</span>
  </div>

  <div class="products" id="products">
    <div class="loading-wrap"><div class="spinner"></div><p>Yuklanmoqda...</p></div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-info">
      <div class="label">Savol? Qo'ng'iroq qiling</div>
      <div class="phone">+996 55 475 85 25</div>
    </div>
    <a class="bottom-call" href="tel:+996554758525">📞 Aloqa</a>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" id="modal-content">
      <div class="modal-handle"></div>
      <img class="modal-img" id="m-img" src="" alt="">
      <div class="modal-name" id="m-name"></div>
      <div class="modal-price" id="m-price"></div>
      <div class="specs-grid" id="m-specs"></div>
      <a class="modal-call" id="m-call" href="">📞 Qo'ng'iroq qilish</a>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">Yopish</button>
    </div>
  </div>

  <script>
    let allProducts = [];

    async function loadProducts() {
      const container = document.getElementById('products');
      try {
        const res = await fetch('/api/get-products');
        allProducts = await res.json();
        document.getElementById('count').textContent = allProducts.length;
        if (!allProducts.length) {
          container.innerHTML = '<div class="empty"><div class="icon">📦</div><p>Hozircha mahsulot yo\'q</p></div>';
          return;
        }
        container.innerHTML = allProducts.map((p, i) => `
          <div class="card" style="animation-delay:${i*0.06}s" onclick="openModal('${p.id}')">
            <div class="card-img-wrap">
              <img class="card-img" src="${p.image_url}" alt="${p.name}" onerror="this.style.background='#1a1a1a'">
              <div class="card-badge">✓ Mavjud</div>
            </div>
            <div class="card-body">
              <div class="card-name">${p.name}</div>
              <div class="card-price">${Number(p.price).toLocaleString()} so'm</div>
              <div class="specs">
                ${p.ram ? `<span class="spec-tag">RAM: ${p.ram}</span>` : ''}
                ${p.storage ? `<span class="spec-tag">${p.storage}</span>` : ''}
                ${p.battery ? `<span class="spec-tag">${p.battery}</span>` : ''}
              </div>
              <a class="call-btn" href="tel:${p.phone}" onclick="event.stopPropagation()">📞 Qo'ng'iroq</a>
            </div>
          </div>
        `).join('');
      } catch(e) {
        container.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Xatolik yuz berdi</p></div>';
      }
    }

    function openModal(id) {
      const p = allProducts.find(x => x.id === id);
      if (!p) return;
      document.getElementById('m-img').src = p.image_url;
      document.getElementById('m-name').textContent = p.name;
      document.getElementById('m-price').textContent = Number(p.price).toLocaleString() + ' so\'m';
      document.getElementById('m-call').href = 'tel:' + p.phone;
      const specs = [
        {l:'Processor', v: p.processor},
        {l:'RAM', v: p.ram},
        {l:'Storage', v: p.storage},
        {l:'Display', v: p.display},
        {l:'Camera', v: p.camera},
        {l:'Battery', v: p.battery},
      ].filter(s => s.v);
      document.getElementById('m-specs').innerHTML = specs.map(s =>
        `<div class="spec-item"><div class="s-label">${s.l}</div><div class="s-val">${s.v}</div></div>`
      ).join('');
      document.getElementById('modal').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.remove('open');
      }
    }

    loadProducts();
  </script>
</body>
</html>
