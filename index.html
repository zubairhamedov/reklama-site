<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZB STORE</title>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--blue:#0A84FF;--blue2:#409CFF;--dark:#000000;--card:#1C1C1E;--card2:#2C2C2E;--border:#38383A;--text:#FFFFFF;--text2:#EBEBF5;--muted:#8E8E93;--accent:#0A84FF;--green:#30D158;--red:#FF453A;--orange:#FF9F0A}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

    /* HEADER */
    header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:0.5px solid rgba(255,255,255,0.1);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px}
    .logo img{width:36px;height:36px;border-radius:9px;object-fit:cover}
    .logo-text .name{font-size:17px;font-weight:700;letter-spacing:-0.4px}
    .logo-text .sub{font-size:11px;color:var(--muted)}
    .live-badge{display:flex;align-items:center;gap:5px;background:rgba(10,132,255,0.15);border:0.5px solid rgba(10,132,255,0.4);color:var(--blue2);padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600}
    .live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

    /* HERO */
    .hero{margin:12px 14px;border-radius:20px;padding:26px 20px 22px;background:linear-gradient(145deg,#0a0a2e 0%,#0d1b4d 60%,#1a237e 100%);position:relative;overflow:hidden}
    .hero-glow{position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(10,132,255,0.25),transparent 70%);animation:glow-move 6s ease-in-out infinite}
    @keyframes glow-move{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,20px)}}
    .hero h2{font-size:26px;font-weight:800;letter-spacing:-0.8px;margin-bottom:6px;line-height:1.15;position:relative}
    .hero p{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:18px;position:relative}
    .hero-contacts{display:flex;gap:8px;flex-wrap:wrap;position:relative}
    .hc-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:12px;font-weight:600;font-size:12px;text-decoration:none;transition:transform 0.15s,opacity 0.15s}
    .hc-btn:active{transform:scale(0.95);opacity:0.8}
    .hc-call{background:#0A84FF;color:white}
    .hc-wa{background:#25D366;color:white}
    .hc-tg{background:#2AABEE;color:white}
    .hc-ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:white}
    .hc-icon{width:16px;height:16px;flex-shrink:0}

    /* SEARCH */
    .search-wrap{padding:12px 14px 6px;position:relative}
    .search-input{width:100%;background:var(--card);border:none;border-radius:12px;padding:10px 16px 10px 38px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
    .search-input::placeholder{color:var(--muted)}
    .search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}

    /* CATS */
    .cats{display:flex;gap:8px;padding:10px 14px 4px;overflow-x:auto;scrollbar-width:none}
    .cats::-webkit-scrollbar{display:none}
    .cat-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;border:0.5px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit}
    .cat-btn.active{background:var(--blue);color:white;border-color:var(--blue)}

    /* SORT */
    .sort-bar{display:flex;gap:8px;padding:8px 14px 10px;overflow-x:auto;scrollbar-width:none}
    .sort-bar::-webkit-scrollbar{display:none}
    .sort-btn{flex-shrink:0;padding:5px 12px;border-radius:8px;border:0.5px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.2s}
    .sort-btn.active{background:rgba(10,132,255,0.15);color:var(--blue2);border-color:rgba(10,132,255,0.3)}

    /* SECTION HEAD */
    .section-head{padding:4px 16px 8px;display:flex;align-items:center;justify-content:space-between}
    .section-head h3{font-size:20px;font-weight:700;letter-spacing:-0.4px}
    .count-badge{background:var(--card2);color:var(--muted);font-size:12px;font-weight:600;padding:3px 10px;border-radius:10px}

    /* GRID */
    .products{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 14px 110px}

    /* CARD */
    .card{background:var(--card);border-radius:16px;overflow:hidden;border:0.5px solid var(--border);cursor:pointer;transition:transform 0.2s;animation:fadeUp 0.4s ease both}
    .card:active{transform:scale(0.97)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-img-wrap{position:relative;overflow:hidden}
    .card-img{width:100%;height:148px;object-fit:cover;display:block;background:var(--card2);transition:transform 0.3s}
    .card:active .card-img{transform:scale(1.03)}
    .card-cat-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);color:white;font-size:9px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:0.3px}
    .card-body{padding:10px}
    .card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-price{font-size:15px;font-weight:700;color:var(--blue2);margin-bottom:8px;letter-spacing:-0.3px}
    .specs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
    .spec-tag{background:var(--card2);color:var(--muted);font-size:9px;font-weight:500;padding:3px 7px;border-radius:6px}
    .call-btn{display:flex;align-items:center;justify-content:center;gap:5px;background:var(--blue);color:white;text-decoration:none;padding:9px 0;border-radius:10px;font-size:12px;font-weight:600}

    /* STATES */
    .loading-wrap{grid-column:1/-1;text-align:center;padding:60px 20px}
    .spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-wrap p,.empty p{color:var(--muted);font-size:14px}
    .empty{grid-column:1/-1;text-align:center;padding:60px 20px}
    .empty-icon{font-size:48px;margin-bottom:12px}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:200;display:none;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex;animation:fadeIn 0.2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:#1C1C1E;border-radius:20px 20px 0 0;padding:0 0 34px;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp 0.35s cubic-bezier(0.32,0.72,0,1)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle-wrap{padding:10px 0 0;display:flex;justify-content:center}
    .modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px}
    .modal-img{width:100%;height:240px;object-fit:cover;display:block}
    .modal-body{padding:16px 18px 0}
    .modal-cat{display:inline-block;background:rgba(10,132,255,0.15);color:var(--blue2);padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
    .modal-name{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px}
    .modal-price{font-size:28px;font-weight:800;color:var(--blue2);letter-spacing:-0.8px;margin-bottom:16px}
    .specs-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
    .specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
    .spec-item{background:var(--card2);border-radius:12px;padding:10px 12px}
    .spec-item .sl{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.3px}
    .spec-item .sv{font-size:13px;font-weight:600;color:var(--text)}
    .modal-actions{display:flex;flex-direction:column;gap:10px;padding:0 18px}
    .ma-row{display:flex;gap:10px}
    .ma-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;font-weight:600;font-size:15px;text-decoration:none;transition:opacity 0.2s}
    .ma-btn:active{opacity:0.75}
    .ma-call{background:var(--blue);color:white}
    .ma-wa{background:#25D366;color:white}
    .ma-tg{background:#2AABEE;color:white}
    .ma-ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:white}
    .ma-close{background:var(--card2);color:var(--muted);border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600}
  </style>
</head>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" id="search" placeholder="Mahsulot qidirish..." oninput="renderProducts()">
</div>

<div class="cats">
  <button class="cat-btn active" onclick="filterCat('all',this)">🏠 Barchasi</button>
  <button class="cat-btn" onclick="filterCat('telefon',this)">📱 Telefon</button>
  <button class="cat-btn" onclick="filterCat('naushnik',this)">🎧 Naushnik</button>
  <button class="cat-btn" onclick="filterCat('steklo',this)">🛡️ Steklo</button>
  <button class="cat-btn" onclick="filterCat('chehol',this)">📦 Chehol</button>
</div>

<div class="section-head">
  <h3>Mahsulotlar</h3>
  <span class="count-badge" id="count">0</span>
</div>

<div class="sort-bar">
  <button class="sort-btn active" onclick="sortBy('new',this)">🆕 Yangi</button>
  <button class="sort-btn" onclick="sortBy('cheap',this)">💰 Arzon</button>
  <button class="sort-btn" onclick="sortBy('expensive',this)">💎 Qimmat</button>
</div>

<div class="products" id="products">
  <div class="loading-wrap"><div class="spinner"></div><p>Yuklanmoqda...</p></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle-wrap"><div class="modal-handle"></div></div>
    <img class="modal-img" id="m-img" src="" alt="">
    <div class="modal-body">
      <div class="modal-cat" id="m-cat"></div>
      <div class="modal-name" id="m-name"></div>
      <div class="modal-price" id="m-price"></div>
      <div class="specs-title" id="m-specs-title" style="display:none">Характеристикалар</div>
      <div class="specs-grid" id="m-specs"></div>
    </div>
    <div class="modal-actions">
      <div class="ma-row">
        <a class="ma-btn ma-call" id="m-call" href="">📞 Qo'ng'iroq</a>
        <a class="ma-btn ma-wa" id="m-wa" href="" target="_blank">💬 WhatsApp</a>
      </div>
      <div class="ma-row">
        <a class="ma-btn ma-tg" href="https://t.me/hamedovv_7" target="_blank">✈️ Telegram</a>
        <a class="ma-btn ma-ig" href="https://instagram.com/hamedovv_7" target="_blank">📸 Instagram</a>
      </div>
      <button class="ma-btn ma-close" onclick="document.getElementById('modal').classList.remove('open')">Yopish</button>
    </div>
  </div>
</div>

<script>
  let allProducts=[];
  let currentCat='all';
  let currentSort='new';

  async function loadProducts(){
    try{
      const res=await fetch('/api/get-products');
      allProducts=await res.json();
      renderProducts();
    }catch(e){
      document.getElementById('products').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>Xatolik yuz berdi</p></div>';
    }
  }

  function filterCat(cat,btn){
    currentCat=cat;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    if(btn)btn.classList.add('active');
    renderProducts();
  }

  function sortBy(type,btn){
    currentSort=type;
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    if(btn)btn.classList.add('active');
    renderProducts();
  }

  function renderProducts(){
    const search=document.getElementById('search').value.toLowerCase();
    let filtered=currentCat==='all'?[...allProducts]:allProducts.filter(p=>p.category===currentCat);
    if(search)filtered=filtered.filter(p=>p.name.toLowerCase().includes(search));
    if(currentSort==='cheap')filtered.sort((a,b)=>Number(a.price)-Number(b.price));
    else if(currentSort==='expensive')filtered.sort((a,b)=>Number(b.price)-Number(a.price));
    document.getElementById('count').textContent=filtered.length;
    const catLabel={telefon:'📱 Telefon',naushnik:'🎧 Naushnik',steklo:'🛡️ Steklo',chehol:'📦 Chehol'};
    const container=document.getElementById('products');
    if(!filtered.length){
      container.innerHTML='<div class="empty"><div class="empty-icon">📦</div><p>Hozircha mahsulot yo\'q</p></div>';
      return;
    }
    container.innerHTML=filtered.map((p,i)=>`
      <div class="card" style="animation-delay:${i*0.05}s" onclick="openModal('${p.id}')">
        <div class="card-img-wrap">
          <img class="card-img" src="${p.image_url}" alt="${p.name}" onerror="this.style.background='#2C2C2E'">
          <div class="card-cat-badge">${catLabel[p.category]||p.category||''}</div>
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-price">${Number(p.price).toLocaleString()} so'm</div>
          <div class="specs">
            ${p.ram?`<span class="spec-tag">RAM: ${p.ram}</span>`:''}
            ${p.storage?`<span class="spec-tag">${p.storage}</span>`:''}
            ${p.connection_type?`<span class="spec-tag">${p.connection_type}</span>`:''}
            ${p.case_type?`<span class="spec-tag">${p.case_type}</span>`:''}
            ${p.glass_type?`<span class="spec-tag">${p.glass_type}</span>`:''}
          </div>
          <a class="call-btn" href="tel:${p.phone}" onclick="event.stopPropagation()">📞 Qo'ng'iroq</a>
        </div>
      </div>
    `).join('');
  }

  function openModal(id){
    const p=allProducts.find(x=>x.id===id);if(!p)return;
    const catLabel={telefon:'📱 Telefon',naushnik:'🎧 Naushnik',steklo:'🛡️ Steklo',chehol:'📦 Chehol'};
    document.getElementById('m-img').src=p.image_url;
    document.getElementById('m-cat').textContent=catLabel[p.category]||p.category||'';
    document.getElementById('m-name').textContent=p.name;
    document.getElementById('m-price').textContent=Number(p.price).toLocaleString()+' so\'m';
    document.getElementById('m-call').href='tel:'+p.phone;
    document.getElementById('m-wa').href='https://wa.me/'+p.phone.replace(/\D/g,'');

    let specs=[];
    if(p.category==='telefon'){
      specs=[{l:'Processor',v:p.processor},{l:'RAM',v:p.ram},{l:'Storage',v:p.storage},{l:'Display',v:p.display},{l:'Camera',v:p.camera},{l:'Battery',v:p.battery}];
    }else if(p.category==='naushnik'){
      specs=[{l:'Ulanish',v:p.connection_type},{l:'Moslik',v:p.compatibility},{l:'Battery',v:p.battery}];
    }else if(p.category==='steklo'){
      specs=[{l:'Turi',v:p.glass_type},{l:'Maxfiylik',v:p.glass_privacy},{l:'Moslik',v:p.compatibility}];
    }else if(p.category==='chehol'){
      specs=[{l:'Material',v:p.case_type},{l:'Moslik',v:p.compatibility}];
    }
    specs=specs.filter(s=>s.v);
    const specsEl=document.getElementById('m-specs');
    const specsTitleEl=document.getElementById('m-specs-title');
    if(specs.length){
      specsTitleEl.style.display='block';
      specsEl.innerHTML=specs.map(s=>`<div class="spec-item"><div class="sl">${s.l}</div><div class="sv">${s.v}</div></div>`).join('');
    }else{
      specsTitleEl.style.display='none';
      specsEl.innerHTML='';
    }
    document.getElementById('modal').classList.add('open');
  }

  function closeModal(e){if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open')}
  loadProducts();
</script>
</body>
</html>
