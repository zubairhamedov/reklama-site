<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zubair Hamedov Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF5C00;
      --yellow: #FFD600;
      --dark: #0D0D0D;
      --card: #161616;
      --border: #2a2a2a;
      --text: #F0F0F0;
      --muted: #777;
      --green: #00E676;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,13,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-badge {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, var(--orange), var(--yellow));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
      color: white; letter-spacing: -1px; flex-shrink: 0;
    }
    .logo-text .name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: var(--text); }
    .logo-text .sub { font-size: 11px; color: var(--orange); font-weight: 500; }
    .live-badge {
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,230,118,0.12); border: 1px solid rgba(0,230,118,0.3);
      color: var(--green); padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.3)} }
    .hero {
      margin: 16px; border-radius: 20px; padding: 28px 22px;
      background: linear-gradient(135deg, #FF5C00 0%, #FF8C00 60%, #FFD600 100%);
      position: relative; overflow: hidden;
    }
    .hero::after {
      content: '📱'; position: absolute; right: -8px; bottom: -10px;
      font-size: 110px; opacity: 0.18; transform: rotate(15deg);
    }
    .hero-tag {
      display: inline-block; background: rgba(255,255,255,0.22);
      backdrop-filter: blur(4px); color: white;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.3);
    }
    .hero h2 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: white; line-height: 1.2; margin-bottom: 8px; }
    .hero p { color: rgba(255,255,255,0.85); font-size: 13px; margin-bottom: 16px; }
    .hero-call {
      display: inline-flex; align-items: center; gap: 8px;
      background: white; color: var(--orange);
      padding: 10px 20px; border-radius: 30px;
      font-weight: 700; font-size: 14px; text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .section-head { padding: 20px 18px 14px; display: flex; align-items: center; gap: 10px; }
    .section-head h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
    .section-head .count {
      background: var(--orange); color: white;
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
    }
    .products { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 14px 100px; }
    .card {
      background: var(--card); border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border); animation: fadeUp 0.5s ease both; transition: border-color 0.2s;
    }
    .card:active { border-color: var(--orange); transform: scale(0.98); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .card-img { width: 100%; height: 150px; object-fit: cover; background: #1f1f1f; display: block; }
    .card-body { padding: 12px; }
    .card-name {
      font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-price { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--yellow); margin-bottom: 10px; }
    .call-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: linear-gradient(135deg, var(--orange), #ff7a00);
      color: white; text-decoration: none; padding: 9px 0; border-radius: 10px;
      font-size: 13px; font-weight: 600;
    }
    .loading-wrap { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--orange); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-wrap p { color: var(--muted); font-size: 14px; }
    .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
    .empty .icon { font-size: 52px; margin-bottom: 12px; }
    .empty p { color: var(--muted); font-size: 14px; }
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(13,13,13,0.97); border-top: 1px solid var(--border);
      backdrop-filter: blur(12px); padding: 12px 20px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .bottom-info .label { font-size: 11px; color: var(--muted); }
    .bottom-info .phone { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
    .bottom-call {
      display: flex; align-items: center; gap: 7px;
      background: var(--green); color: #0D0D0D;
      padding: 12px 20px; border-radius: 30px;
      font-weight: 700; font-size: 14px; text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-badge">ZH</div>
      <div class="logo-text">
        <div class="name">Zubair Hamedov</div>
        <div class="sub">Shop • Telefon & Elektronika</div>
      </div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </header>
  <div class="hero">
    <div class="hero-tag">⚡ Yangi mahsulotlar</div>
    <h2>Eng yaxshi<br>telefonlar</h2>
    <p>Qulay narxda, tez yetkazib berish</p>
    <a class="hero-call" href="tel:+996554758525">📞 Bog'lanish</a>
  </div>
  <div class="section-head">
    <h3>Mahsulotlar</h3>
    <span class="count" id="count">0</span>
  </div>
  <div class="products" id="products">
    <div class="loading-wrap"><div class="spinner"></div><p>Yuklanmoqda...</p></div>
  </div>
  <div class="bottom-bar">
    <div class="bottom-info">
      <div class="label">Savol? Qo'ng'iroq qiling</div>
      <div class="phone">+996 55 475 85 25</div>
    </div>
    <a class="bottom-call" href="tel:+996554758525">📞 Aloqa</a>
  </div>
  <script>
    async function loadProducts() {
      const container = document.getElementById('products');
      const countEl = document.getElementById('count');
      try {
        const res = await fetch('/api/get-products');
        const products = await res.json();
        countEl.textContent = products.length;
        if (!products.length) {
          container.innerHTML = '<div class="empty"><div class="icon">📦</div><p>Hozircha mahsulot yo\'q</p></div>';
          return;
        }
        container.innerHTML = products.map((p, i) => `
          <div class="card" style="animation-delay:${i * 0.07}s">
            <img class="card-img" src="${p.image_url}" alt="${p.name}" onerror="this.style.background='#2a2a2a'">
            <div class="card-body">
              <div class="card-name">${p.name}</div>
              <div class="card-price">${Number(p.price).toLocaleString()} so'm</div>
              <a class="call-btn" href="tel:${p.phone}">📞 Qo'ng'iroq</a>
            </div>
          </div>
        `).join('');
      } catch(e) {
        container.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Xatolik yuz berdi</p></div>';
      }
    }
    loadProducts();
  </script>
</body>
</html>
