<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ZB Store</title>
  <style>
    :root{--blue:#0A84FF;--dark:#000;--card:#1C1C1E;--card2:#2C2C2E;--border:#38383A;--text:#FFF;--muted:#8E8E93;--red:#FF453A;--green:#30D158}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

    /* LOGIN */
    #login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at top,#0d1b4d,#000)}
    .login-logo{width:80px;height:80px;border-radius:20px;object-fit:cover;margin-bottom:16px;border:0.5px solid var(--border)}
    #login-screen h2{font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
    #login-screen p{color:var(--muted);font-size:14px;margin-bottom:28px}
    .input-wrap{width:100%;max-width:340px;position:relative;margin-bottom:12px}
    .input-wrap input{width:100%;background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:15px 48px 15px 16px;color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
    .input-wrap input:focus{border-color:var(--blue)}
    .input-wrap input.error{border-color:var(--red);animation:shake 0.4s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
    .login-btn{width:100%;max-width:340px;background:var(--blue);color:white;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity 0.2s}
    .login-btn:active{opacity:0.75}
    .error-msg{color:var(--red);font-size:13px;margin-top:10px;display:none;text-align:center}

    /* ADMIN */
    #admin-screen{display:none}
    header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(255,255,255,0.1);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px}
    .logo img{width:34px;height:34px;border-radius:8px;object-fit:cover}
    .logo-text .name{font-size:15px;font-weight:700;letter-spacing:-0.3px}
    .logo-text .sub{font-size:11px;color:var(--muted)}
    .logout-btn{background:rgba(255,69,58,0.15);border:0.5px solid rgba(255,69,58,0.3);color:var(--red);padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

    .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
    .stat-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:14px}
    .stat-card .sl{font-size:11px;color:var(--muted);margin-bottom:4px}
    .stat-card .sv{font-size:26px;font-weight:700;color:var(--blue);letter-spacing:-0.5px}

    .tabs{display:flex;margin:0 16px 16px;background:var(--card);border-radius:12px;padding:3px;border:0.5px solid var(--border)}
    .tab-btn{flex:1;padding:9px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:600;border-radius:9px;cursor:pointer;font-family:inherit;transition:all 0.2s}
    .tab-btn.active{background:var(--blue);color:white}
    .tab-content{display:none}
    .tab-content.active{display:block}

    .form-section{padding:0 16px 20px}
    .form-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;margin-bottom:16px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;letter-spacing:0.3px;text-transform:uppercase}
    .field input,.field select{width:100%;background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
    .field input:focus,.field select:focus{border-color:var(--blue)}
    .field input::placeholder{color:#3a3a3c}
    .field select option{background:#1c1c1e}
    .specs-grid-form{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

    /* CATEGORY SPECS */
    .cat-specs{display:none}
    .cat-specs.active{display:block}

    .img-upload{width:100%;border:1.5px dashed var(--border);border-radius:14px;padding:24px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s}
    .img-upload:active{border-color:var(--blue)}
    .img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .up-icon{font-size:30px;margin-bottom:8px}
    .up-label{color:var(--blue);font-weight:600;font-size:14px;margin-bottom:4px}
    .up-sub{color:var(--muted);font-size:13px}
    #preview-wrap{display:none;margin-top:12px;position:relative}
    #preview-wrap img{width:100%;border-radius:12px;max-height:200px;object-fit:cover}
    .remove-img{position:absolute;top:8px;right:8px;background:rgba(255,69,58,0.9);color:white;border:none;border-radius:50%;width:28px;height:28px;font-size:13px;cursor:pointer}

    .submit-btn{width:100%;background:var(--blue);color:white;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
    .submit-btn:disabled{opacity:0.5}
    .submit-btn:active{opacity:0.8}

    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;border-radius:30px;font-weight:600;font-size:14px;transition:transform 0.3s ease;z-index:999;white-space:nowrap;background:var(--card2);color:var(--text);border:0.5px solid var(--border)}
    .toast.success{background:#1c3a24;color:var(--green);border-color:rgba(48,209,88,0.3)}
    .toast.error-toast{background:#3a1c1c;color:var(--red);border-color:rgba(255,69,58,0.3)}
    .toast.show{transform:translateX(-50%) translateY(0)}

    .list-section{padding:0 16px 100px}
    .list-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;margin-bottom:14px}
    .prod-item{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:12px;margin-bottom:10px;display:flex;gap:12px;align-items:center;animation:fadeUp 0.4s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .prod-item img{width:60px;height:60px;border-radius:10px;object-fit:cover;background:var(--card2);flex-shrink:0}
    .prod-info{flex:1;min-width:0}
    .p-name{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .p-price{color:#409CFF;font-weight:700;font-size:13px;margin-bottom:2px}
    .p-cat{color:var(--muted);font-size:11px}
    .item-btns{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
    .edit-btn{background:rgba(10,132,255,0.15);border:0.5px solid rgba(10,132,255,0.3);color:#409CFF;padding:7px 10px;border-radius:8px;font-size:14px;cursor:pointer}
    .delete-btn{background:rgba(255,69,58,0.15);border:0.5px solid rgba(255,69,58,0.3);color:var(--red);padding:7px 10px;border-radius:8px;font-size:14px;cursor:pointer}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:200;display:none;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex;animation:fadeIn 0.2s ease}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .edit-modal{background:#1c1c1e;border-radius:20px 20px 0 0;padding:20px 18px 34px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.35s cubic-bezier(0.32,0.72,0,1)}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px}
    .modal-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;margin-bottom:16px}
    .save-btn{width:100%;background:var(--blue);color:white;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
    .cancel-btn{width:100%;background:var(--card2);border:none;color:var(--muted);padding:13px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
  </style>
</head>
<body>

<div id="login-screen">
  <img class="login-logo" src="https://ljgxumoznuiwgeqpygni.supabase.co/storage/v1/object/public/products/IMG_5712.jpeg" alt="ZB">
  <h2>ZB STORE</h2>
  <p>Admin Panel</p>
  <div class="input-wrap">
    <input type="password" id="pwd-input" placeholder="Parol..."/>
    <button class="eye-btn" onclick="toggleEye()">👁</button>
  </div>
  <button class="login-btn" onclick="checkLogin()">Kirish</button>
  <p class="error-msg" id="err-msg">❌ Parol noto'g'ri!</p>
</div>

<div id="admin-screen">
  <header>
    <div class="logo">
      <img src="https://ljgxumoznuiwgeqpygni.supabase.co/storage/v1/object/public/products/IMG_5712.jpeg" alt="ZB">
      <div class="logo-text">
        <div class="name">Admin Panel</div>
        <div class="sub">ZB Store</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Chiqish</button>
  </header>

  <div class="stats">
    <div class="stat-card"><div class="sl">Jami mahsulot</div><div class="sv" id="total-count">0</div></div>
    <div class="stat-card"><div class="sl">Holat</div><div class="sv" style="color:var(--green);font-size:15px;padding-top:6px">✅ Faol</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('add',this)">➕ Qo'shish</button>
    <button class="tab-btn" onclick="switchTab('list',this)">📦 Mahsulotlar</button>
  </div>

  <div id="tab-add" class="tab-content active">
    <div class="form-section">
      <div class="form-title">Yangi mahsulot</div>

      <div class="field">
        <label>Kategoriya</label>
        <select id="p-cat" onchange="showCatSpecs(this.value)">
          <option value="telefon">📱 Telefon</option>
          <option value="naushnik">🎧 Naushnik</option>
          <option value="steklo">🛡️ Steklo</option>
          <option value="chehol">📦 Chehol</option>
        </select>
      </div>
      <div class="field"><label>Mahsulot nomi</label><input type="text" id="p-name" placeholder="Nomini kiriting..."/></div>
      <div class="field"><label>Narxi (so'm)</label><input type="number" id="p-price" placeholder="Narxini kiriting..."/></div>
      <div class="field"><label>Telefon raqam</label><input type="tel" id="p-phone" placeholder="+996554758525"/></div>

      <!-- TELEFON -->
      <div class="cat-specs active" id="specs-telefon">
        <div class="field"><label>📱 Telefon характеристикалари</label></div>
        <div class="specs-grid-form">
          <div class="field" style="margin:0"><label>Processor</label><input type="text" id="p-processor" placeholder="A17 Pro"/></div>
          <div class="field" style="margin:0"><label>RAM</label><input type="text" id="p-ram" placeholder="8GB"/></div>
          <div class="field" style="margin:0"><label>Storage</label><input type="text" id="p-storage" placeholder="256GB"/></div>
          <div class="field" style="margin:0"><label>Display</label><input type="text" id="p-display" placeholder="6.7 inch OLED"/></div>
          <div class="field" style="margin:0"><label>Camera</label><input type="text" id="p-camera" placeholder="48MP"/></div>
          <div class="field" style="margin:0"><label>Battery</label><input type="text" id="p-battery" placeholder="4422mAh"/></div>
        </div>
      </div>

      <!-- NAUSHNIK -->
      <div class="cat-specs" id="specs-naushnik">
        <div class="field"><label>🎧 Naushnik характеристикалари</label></div>
        <div class="specs-grid-form">
          <div class="field" style="margin:0"><label>Ulanish turi</label><input type="text" id="p-connection" placeholder="Bluetooth / Provodli"/></div>
          <div class="field" style="margin:0"><label>Moslik</label><input type="text" id="p-compat" placeholder="iPhone / Android"/></div>
          <div class="field" style="margin:0"><label>Batareya</label><input type="text" id="p-nbattery" placeholder="30 soat"/></div>
          <div class="field" style="margin:0"><label>Shovqin kamaytirish</label><input type="text" id="p-anc" placeholder="ANC bor / yo'q"/></div>
        </div>
      </div>

      <!-- STEKLO -->
      <div class="cat-specs" id="specs-steklo">
        <div class="field"><label>🛡️ Steklo характеристикалари</label></div>
        <div class="specs-grid-form">
          <div class="field" style="margin:0"><label>Steklo turi</label><input type="text" id="p-glasstype" placeholder="Oddiy / Shpion / Maxfiy"/></div>
          <div class="field" style="margin:0"><label>Moslik (telefon)</label><input type="text" id="p-glasscompat" placeholder="iPhone 15 Pro"/></div>
          <div class="field" style="margin:0"><label>Qalinlik</label><input type="text" id="p-glassthick" placeholder="0.3mm"/></div>
          <div class="field" style="margin:0"><label>Qoplama</label><input type="text" id="p-glassprivacy" placeholder="Anti-spy / Oddiy"/></div>
        </div>
      </div>

      <!-- CHEHOL -->
      <div class="cat-specs" id="specs-chehol">
        <div class="field"><label>📦 Chehol характеристикалари</label></div>
        <div class="specs-grid-form">
          <div class="field" style="margin:0"><label>Material</label><input type="text" id="p-casetype" placeholder="Rezina / Qattiq / Teri"/></div>
          <div class="field" style="margin:0"><label>Moslik (telefon)</label><input type="text" id="p-casecompat" placeholder="iPhone 15 Pro"/></div>
          <div class="field" style="margin:0"><label>Himoya darajasi</label><input type="text" id="p-caseprotect" placeholder="360° / Orqa tomon"/></div>
          <div class="field" style="margin:0"><label>Rang</label><input type="text" id="p-casecolor" placeholder="Qora / Shaffof"/></div>
        </div>
      </div>

      <div class="field" style="margin-top:4px"><label>Rasm</label>
        <div class="img-upload" id="upload-area">
          <input type="file" id="img-input" accept="image/*" onchange="previewImg(this)"/>
          <div class="up-icon">🖼️</div>
          <div class="up-label">Rasm tanlash</div>
          <div class="up-sub">Galereyadan tanlang</div>
        </div>
        <div id="preview-wrap">
          <img id="preview-img" src="" alt=""/>
          <button class="remove-img" onclick="removeImg()">✕</button>
        </div>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="addProduct()">➕ Qo'shish</button>
    </div>
  </div>

  <div id="tab-list" class="tab-content">
    <div class="list-section">
      <div class="list-title">📦 Barcha mahsulotlar</div>
      <div id="prod-list"></div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="edit-modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Tahrirlash</div>
    <input type="hidden" id="e-id"/>
    <div class="field"><label>Kategoriya</label>
      <select id="e-cat" onchange="showEditSpecs(this.value)">
        <option value="telefon">📱 Telefon</option>
        <option value="naushnik">🎧 Naushnik</option>
        <option value="steklo">🛡️ Steklo</option>
        <option value="chehol">📦 Chehol</option>
      </select>
    </div>
    <div class="field"><label>Nomi</label><input type="text" id="e-name"/></div>
    <div class="field"><label>Narxi</label><input type="number" id="e-price"/></div>
    <div class="field"><label>Telefon</label><input type="tel" id="e-phone"/></div>

    <div class="cat-specs" id="especs-telefon">
      <div class="specs-grid-form">
        <div class="field" style="margin:0"><label>Processor</label><input type="text" id="e-processor"/></div>
        <div class="field" style="margin:0"><label>RAM</label><input type="text" id="e-ram"/></div>
        <div class="field" style="margin:0"><label>Storage</label><input type="text" id="e-storage"/></div>
        <div class="field" style="margin:0"><label>Display</label><input type="text" id="e-display"/></div>
        <div class="field" style="margin:0"><label>Camera</label><input type="text" id="e-camera"/></div>
        <div class="field" style="margin:0"><label>Battery</label><input type="text" id="e-battery"/></div>
      </div>
    </div>
    <div class="cat-specs" id="especs-naushnik">
      <div class="specs-grid-form">
        <div class="field" style="margin:0"><label>Ulanish</label><input type="text" id="e-connection"/></div>
        <div class="field" style="margin:0"><label>Moslik</label><input type="text" id="e-compat"/></div>
        <div class="field" style="margin:0"><label>Batareya</label><input type="text" id="e-nbattery"/></div>
        <div class="field" style="margin:0"><label>ANC</label><input type="text" id="e-anc"/></div>
      </div>
    </div>
    <div class="cat-specs" id="especs-steklo">
      <div class="specs-grid-form">
        <div class="field" style="margin:0"><label>Turi</label><input type="text" id="e-glasstype"/></div>
        <div class="field" style="margin:0"><label>Moslik</label><input type="text" id="e-glasscompat"/></div>
        <div class="field" style="margin:0"><label>Qalinlik</label><input type="text" id="e-glassthick"/></div>
        <div class="field" style="margin:0"><label>Qoplama</label><input type="text" id="e-glassprivacy"/></div>
      </div>
    </div>
    <div class="cat-specs" id="especs-chehol">
      <div class="specs-grid-form">
        <div class="field" style="margin:0"><label>Material</label><input type="text" id="e-casetype"/></div>
        <div class="field" style="margin:0"><label>Moslik</label><input type="text" id="e-casecompat"/></div>
        <div class="field" style="margin:0"><label>Himoya</label><input type="text" id="e-caseprotect"/></div>
        <div class="field" style="margin:0"><label>Rang</label><input type="text" id="e-casecolor"/></div>
      </div>
    </div>

    <button class="save-btn" onclick="saveEdit()">💾 Saqlash</button>
    <button class="cancel-btn" onclick="document.getElementById('edit-modal').classList.remove('open')">Bekor qilish</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let adminPassword='';
  let products=[];

  async function checkLogin(){
    const pwd=document.getElementById('pwd-input').value;
    if(!pwd)return;
    const inp=document.getElementById('pwd-input');
    try{
      const res=await fetch('/api/add-product',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd,id:'00000000-0000-0000-0000-000000000000'})});
      if(res.status===401){
        inp.classList.add('error');
        document.getElementById('err-msg').style.display='block';
        setTimeout(()=>inp.classList.remove('error'),400);
        return;
      }
    }catch(e){}
    adminPassword=pwd;
    document.getElementById('err-msg').style.display='none';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    loadProducts();
  }

  document.getElementById('pwd-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkLogin()});
  function toggleEye(){const i=document.getElementById('pwd-input');i.type=i.type==='password'?'text':'password'}
  function logout(){adminPassword='';document.getElementById('admin-screen').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('pwd-input').value=''}
  function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.className='toast',3000)}
  function switchTab(tab,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active')}

  function showCatSpecs(cat){
    document.querySelectorAll('.cat-specs').forEach(el=>{
      if(el.id.startsWith('specs-'))el.classList.remove('active');
    });
    const el=document.getElementById('specs-'+cat);
    if(el)el.classList.add('active');
  }

  function showEditSpecs(cat){
    document.querySelectorAll('.cat-specs').forEach(el=>{
      if(el.id.startsWith('especs-'))el.classList.remove('active');
    });
    const el=document.getElementById('especs-'+cat);
    if(el)el.classList.add('active');
  }

  function previewImg(input){
    const file=input.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=e=>{
      document.getElementById('preview-img').src=e.target.result;
      document.getElementById('preview-wrap').style.display='block';
      document.getElementById('upload-area').style.display='none';
    };
    r.readAsDataURL(file);
  }
  function removeImg(){
    document.getElementById('img-input').value='';
    document.getElementById('preview-wrap').style.display='none';
    document.getElementById('upload-area').style.display='block';
  }

  async function addProduct(){
    const name=document.getElementById('p-name').value.trim();
    const price=document.getElementById('p-price').value.trim();
    const phone=document.getElementById('p-phone').value.trim();
    const file=document.getElementById('img-input').files[0];
    const category=document.getElementById('p-cat').value;
    if(!name||!price||!phone||!file){showToast("❌ Asosiy maydonlarni to'ldiring!",'error-toast');return}

    const btn=document.getElementById('submit-btn');
    btn.disabled=true;btn.textContent='⏳ Yuklanmoqda...';

    const r=new FileReader();
    r.onload=async e=>{
      const base64=e.target.result.split(',')[1];
      const ext=file.name.split('.').pop().toLowerCase();
      const body={password:adminPassword,name,price,phone,imageBase64:base64,imageExt:ext,category};

      if(category==='telefon'){
        body.processor=document.getElementById('p-processor').value.trim();
        body.ram=document.getElementById('p-ram').value.trim();
        body.storage=document.getElementById('p-storage').value.trim();
        body.display=document.getElementById('p-display').value.trim();
        body.camera=document.getElementById('p-camera').value.trim();
        body.battery=document.getElementById('p-battery').value.trim();
      }else if(category==='naushnik'){
        body.connection_type=document.getElementById('p-connection').value.trim();
        body.compatibility=document.getElementById('p-compat').value.trim();
        body.battery=document.getElementById('p-nbattery').value.trim();
        body.glass_privacy=document.getElementById('p-anc').value.trim();
      }else if(category==='steklo'){
        body.glass_type=document.getElementById('p-glasstype').value.trim();
        body.compatibility=document.getElementById('p-glasscompat').value.trim();
        body.ram=document.getElementById('p-glassthick').value.trim();
        body.glass_privacy=document.getElementById('p-glassprivacy').value.trim();
      }else if(category==='chehol'){
        body.case_type=document.getElementById('p-casetype').value.trim();
        body.compatibility=document.getElementById('p-casecompat').value.trim();
        body.processor=document.getElementById('p-caseprotect').value.trim();
        body.display=document.getElementById('p-casecolor').value.trim();
      }

      try{
        const res=await fetch('/api/add-product',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const data=await res.json();
        if(data.success){
          showToast("✅ Mahsulot qo'shildi!",'success');
          document.getElementById('p-name').value='';
          document.getElementById('p-price').value='';
          document.getElementById('p-phone').value='';
          removeImg();loadProducts();
        }else showToast('❌ '+(data.error||'Xatolik'),'error-toast');
      }catch(err){showToast('❌ Server xatoligi','error-toast')}
      btn.disabled=false;btn.textContent="➕ Qo'shish";
    };
    r.readAsDataURL(file);
  }

  function openEdit(id){
    const p=products.find(x=>x.id===id);if(!p)return;
    document.getElementById('e-id').value=p.id;
    document.getElementById('e-cat').value=p.category||'telefon';
    document.getElementById('e-name').value=p.name||'';
    document.getElementById('e-price').value=p.price||'';
    document.getElementById('e-phone').value=p.phone||'';
    showEditSpecs(p.category||'telefon');
    if(p.category==='telefon'){
      document.getElementById('e-processor').value=p.processor||'';
      document.getElementById('e-ram').value=p.ram||'';
      document.getElementById('e-storage').value=p.storage||'';
      document.getElementById('e-display').value=p.display||'';
      document.getElementById('e-camera').value=p.camera||'';
      document.getElementById('e-battery').value=p.battery||'';
    }else if(p.category==='naushnik'){
      document.getElementById('e-connection').value=p.connection_type||'';
      document.getElementById('e-compat').value=p.compatibility||'';
      document.getElementById('e-nbattery').value=p.battery||'';
      document.getElementById('e-anc').value=p.glass_privacy||'';
    }else if(p.category==='steklo'){
      document.getElementById('e-glasstype').value=p.glass_type||'';
      document.getElementById('e-glasscompat').value=p.compatibility||'';
      document.getElementById('e-glassthick').value=p.ram||'';
      document.getElementById('e-glassprivacy').value=p.glass_privacy||'';
    }else if(p.category==='chehol'){
      document.getElementById('e-casetype').value=p.case_type||'';
      document.getElementById('e-casecompat').value=p.compatibility||'';
      document.getElementById('e-caseprotect').value=p.processor||'';
      document.getElementById('e-casecolor').value=p.display||'';
    }
    document.getElementById('edit-modal').classList.add('open');
  }

  async function saveEdit(){
    const id=document.getElementById('e-id').value;
    const category=document.getElementById('e-cat').value;
    const body={password:adminPassword,id,category,
      name:document.getElementById('e-name').value,
      price:document.getElementById('e-price').value,
      phone:document.getElementById('e-phone').value
    };
    if(category==='telefon'){
      body.processor=document.getElementById('e-processor').value;
      body.ram=document.getElementById('e-ram').value;
      body.storage=document.getElementById('e-storage').value;
      body.display=document.getElementById('e-display').value;
      body.camera=document.getElementById('e-camera').value;
      body.battery=document.getElementById('e-battery').value;
    }else if(category==='naushnik'){
      body.connection_type=document.getElementById('e-connection').value;
      body.compatibility=document.getElementById('e-compat').value;
      body.battery=document.getElementById('e-nbattery').value;
      body.glass_privacy=document.getElementById('e-anc').value;
    }else if(category==='steklo'){
      body.glass_type=document.getElementById('e-glasstype').value;
      body.compatibility=document.getElementById('e-glasscompat').value;
      body.ram=document.getElementById('e-glassthick').value;
      body.glass_privacy=document.getElementById('e-glassprivacy').value;
    }else if(category==='chehol'){
      body.case_type=document.getElementById('e-casetype').value;
      body.compatibility=document.getElementById('e-casecompat').value;
      body.processor=document.getElementById('e-caseprotect').value;
      body.display=document.getElementById('e-casecolor').value;
    }
    try{
      const res=await fetch('/api/add-product',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await res.json();
      if(data.success){showToast('✅ Saqlandi!','success');document.getElementById('edit-modal').classList.remove('open');loadProducts()}
      else showToast('❌ '+(data.error||'Xatolik'),'error-toast');
    }catch(e){showToast('❌ Xatolik','error-toast')}
  }

  async function deleteProduct(id){
    if(!confirm("O'chirmoqchimisiz?"))return;
    try{
      const res=await fetch('/api/add-product',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:adminPassword,id})});
      const data=await res.json();
      if(data.success){showToast("🗑️ O'chirildi!",'success');loadProducts()}
      else showToast('❌ '+(data.error||'Xatolik'),'error-toast');
    }catch(e){showToast('❌ Xatolik','error-toast')}
  }

  async function loadProducts(){
    try{
      const res=await fetch('/api/get-products');
      products=await res.json();
      document.getElementById('total-count').textContent=products.length;
      const catLabel={telefon:'📱 Telefon',naushnik:'🎧 Naushnik',steklo:'🛡️ Steklo',chehol:'📦 Chehol'};
      const list=document.getElementById('prod-list');
      if(!products.length){list.innerHTML='<p style="color:var(--muted);font-size:14px;padding:20px 0">Hozircha mahsulot yo\'q</p>';return}
      list.innerHTML=products.map((p,i)=>`
        <div class="prod-item" style="animation-delay:${i*0.04}s">
          <img src="${p.image_url}" alt="${p.name}" onerror="this.style.background='#2c2c2e'">
          <div class="prod-info">
            <div class="p-name">${p.name}</div>
            <div class="p-price">${Number(p.price).toLocaleString()} so'm</div>
            <div class="p-cat">${catLabel[p.category]||p.category||''}</div>
          </div>
          <div class="item-btns">
            <button class="edit-btn" onclick="openEdit('${p.id}')">✏️</button>
            <button class="delete-btn" onclick="deleteProduct('${p.id}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }catch(e){document.getElementById('prod-list').innerHTML='<p style="color:var(--muted)">Xatolik</p>'}
  }
</script>
</body>
</html>
